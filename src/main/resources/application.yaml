server:
  port: 8080
  address: 0.0.0.0

spring:
  profiles:
    default: h2
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

app:
  auth:
    jwt-secret: "nani-dairy-dev-secret-change-this-before-production-123456"
    jwt-exp-hours: 24
  delivery:
    day-planner-enabled: true
    day-planner-cron: "0 */30 * * * *"
  tasks:
    automation-enabled: true
    automation-cron: "0 */20 * * * *"
  feed:
    procurement-automation-enabled: true
    procurement-automation-cron: "0 10 5 * * *"
    procurement-lookback-days: 30
    procurement-horizon-days: 30

management:
  endpoints:
    enabled-by-default: true
    access:
      default: unrestricted
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    info:
      access: unrestricted
    metrics:
      access: unrestricted
    prometheus:
      access: unrestricted
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: nani-dairy-backend

logging:
  level:
    org.hibernate.SQL: debug
