server:
  port: 8080
  address: 0.0.0.0

spring:
  profiles:
    default: h2
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

app:
  auth:
    jwt-secret: "nani-dairy-dev-secret-change-this-before-production-123456"
    jwt-exp-hours: 24
  delivery:
    day-planner-enabled: true
    day-planner-cron: "0 */30 * * * *"
  tasks:
    automation-enabled: true
    automation-cron: "0 */20 * * * *"
  feed:
    procurement-automation-enabled: true
    procurement-automation-cron: "0 10 5 * * *"
    procurement-lookback-days: 30
    procurement-horizon-days: 30

logging:
  level:
    org.hibernate.SQL: debug
