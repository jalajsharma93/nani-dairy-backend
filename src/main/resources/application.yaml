server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/nani_dairy;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

app:
  auth:
    jwt-secret: "nani-dairy-dev-secret-change-this-before-production-123456"
    jwt-exp-hours: 24

logging:
  level:
    org.hibernate.SQL: debug
